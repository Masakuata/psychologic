summary: "Catalogo de usuarios"
description: "Operaciones relacionadas con los usuarios de la aplicación"
get:
  summary: "Obtener lista de usuarios"
  tags:
    - "Usuarios"
  parameters:
    - $ref: 'components.yaml#/components/parameters/password'
  responses:
    200:
      description: "Lista de usuarios obtenida exitosamente"
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: 'components.yaml#/components/schemas/registered_user'
post:
  summary: "Crear un nuevo usuario"
  tags:
    - "Usuarios"
  parameters:
    - $ref: 'components.yaml#/components/parameters/password'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: 'components.yaml#/components/schemas/new_user'
  responses:
    201:
      description: "Usuario creado exitosamente"
      content:
        application/json:
          schema:
            $ref: 'components.yaml#/components/schemas/registered_user'