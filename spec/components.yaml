components:
  parameters:
    token:
      name: "Authorization"
      in: "header"
      description: "Token de sesion"
      required: true
      schema:
        type: string
        example: "eyJhbGciOiJIUzI1NiJ9.eyJzdWIiOiJlZHNvbjJAbWFpbC5jb20iLCJleHAiOjE3NzcxODg5NjYsImVtYWlsIjoiZWRzb24yQG1haWwuY29tIiwicm9sIjoicGFjaWVudGUifQ.JfchInZE0B6NOHBV11P9_q2zYepDq6xAA8dJomwE_yM"
    password:
      name: "Authorization"
      in: "header"
      description: "Contraseña para autenticación"
      required: true
      schema:
        type: string
        example: "my_secure_password"
  schemas:
    login:
      type: object
      properties:
        email:
          type: string
          example: "juan.perez@example.com"
        password:
          type: string
          example: "contrasenaSegura123"
    nuevo_usuario:
      type: object
      allOf:
        - $ref: '#/components/schemas/login'
      properties:
        name:
          type: string
          example: "Juan Pérez"
    usuario_registrado:
      type: object
      allOf:
        - $ref: '#/components/schemas/nuevo_usuario'
      properties:
        id:
          type: integer
          example: 1
    nuevo_paciente:
      allOf:
        - $ref: '#/components/schemas/nuevo_usuario'
    paciente_registrado:
      allOf:
        - $ref: '#/components/schemas/usuario_registrado'
    nuevo_psicologo:
      allOf:
        - $ref: '#/components/schemas/nuevo_usuario'
    psicologo_registrado:
      allOf:
        - $ref: '#/components/schemas/usuario_registrado'
