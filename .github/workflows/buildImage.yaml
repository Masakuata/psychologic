name: "🐋Build Docker image"

on:
  workflow_dispatch:
    inputs:
      tag:
        type: string
        description: "Version o tag de la imagen ('latest' o 'v1.0')"
        required: true
        default: "latest"
      external_port:
        type: number
        description: "Puerto externo para mapear al contenedor (8080)"
        required: false
        default: 42700
      internal_port:
        type: number
        description: "Puerto interno en el que escucha la aplicación (80)"
        required: false
        default: 42700
      dev_deploy:
        type: boolean
        description: "¿Desplegar en entorno de desarrollo?"
        required: false
        default: false

env:
  IMAGE_NAME: "ghcr.io/${{ github.repository_owner }}/bpsychologic"

jobs:
  build_image:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v3

      - name: "Set up QEMU"
        uses: docker/setup-qemu-action@v2

      - name: "Set up Docker Buildx"
        uses: docker/setup-buildx-action@v2

      - name: "Log in to GitHub Container Registry"
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.AUTOMATION_TOKEN }}

      - name: "Setup java"
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'
      
      - name: "Build maven project"
        run: mvn clean package -DskipTests

      - name: Build and push Docker image
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ github.event.inputs.tag }}, ${{ env.IMAGE_NAME }}:latest
          platforms: linux/amd64,linux/arm64